{% extends "base.html" %}

{% block content %}
<section class="section gallery-section">
    <div class="section-header" data-aos="fade-up">
        <h2>Gallery</h2>
        <p>Relive the best moments from the fest.</p>
    </div>

    <div class="swiper gallery-swiper" data-aos="fade-up">
        <div class="swiper-wrapper">
            <div class="swiper-slide gallery-slide gallery-1"></div>
            <div class="swiper-slide gallery-slide gallery-2"></div>
            <div class="swiper-slide gallery-slide gallery-3"></div>
            <div class="swiper-slide gallery-slide gallery-4"></div>
        </div>
        <div class="swiper-button-prev"></div>
        <div class="swiper-button-next"></div>
        <div class="swiper-pagination"></div>
    </div>

    <div class="gallery-grid">
        <div class="gallery-item" data-aos="zoom-in"></div>
        <div class="gallery-item" data-aos="zoom-in" data-aos-delay="60"></div>
        <div class="gallery-item" data-aos="zoom-in" data-aos-delay="120"></div>
        <div class="gallery-item" data-aos="zoom-in" data-aos-delay="180"></div>
    </div>
</section>
{% endblock %}
