{% extends "base.html" %}

{% block content %}
<section class="section login-section">
    <div class="section-header" data-aos="fade-up">
        <h2>Login</h2>
        <p>Students can log in with email. Admins log in with a password.</p>
    </div>

    <div class="login-grid">
        <div class="login-card" data-aos="fade-right">
            <h3>Student Login</h3>
            <form class="form-card" method="post">
                <input type="hidden" name="role" value="student">
                <input type="hidden" name="next" value="{{ next_url }}">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" name="email" placeholder="student@college.edu" required>
                </div>
                <button type="submit" class="btn-primary ripple">Continue</button>
            </form>
        </div>

        <div class="login-card" data-aos="fade-left">
            <h3>Admin Login</h3>
            <form class="form-card" method="post">
                <input type="hidden" name="role" value="admin">
                <div class="form-group">
                    <label>Admin Password</label>
                    <input type="password" name="password" placeholder="Set ADMIN_PASSWORD on server" required>
                </div>
                <button type="submit" class="btn-primary ripple">Login as Admin</button>
            </form>
        </div>
    </div>

    {% if error %}
    <p class="form-error" data-aos="fade-up">{{ error }}</p>
    {% endif %}
</section>
{% endblock %}
